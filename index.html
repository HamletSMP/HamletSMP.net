<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamlet SMP | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f4f4f5; }
        .selection-fuchsia::selection { background-color: rgba(217, 70, 239, 0.3); }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fade-in-up 0.6s ease-out forwards; }
        
        /* Custom text shadow for maximum legibility without a box */
        .text-glow {
            text-shadow: 0 0 30px rgba(0,0,0,1), 0 0 60px rgba(0,0,0,1), 0 10px 20px rgba(0,0,0,1);
        }
    </style>
</head>
<body class="selection-fuchsia">
    <!-- Navbar -->
    <nav id="navbar" class="fixed w-full z-50 transition-all duration-500 bg-transparent py-8">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-3 group cursor-pointer">
                <span class="text-xl font-black tracking-tighter uppercase italic text-white">HAMLET<span class="text-fuchsia-500">SMP</span></span>
            </a>
            <div class="hidden md:flex items-center space-x-10 text-sm font-bold">
                <a href="index.html" class="relative py-2 transition-all uppercase tracking-widest text-[10px] text-fuchsia-400">
                    Home
                    <span class="absolute bottom-0 left-0 w-full h-0.5 bg-fuchsia-500"></span>
                </a>
                <a href="forum.html" class="text-zinc-200 hover:text-white uppercase tracking-widest text-[10px] transition-colors">Forum</a>
                <a href="shop.html" class="text-zinc-200 hover:text-white uppercase tracking-widest text-[10px] transition-colors">Shop</a>
                <a href="apply.html" class="text-zinc-200 hover:text-white uppercase tracking-widest text-[10px] transition-colors">Apply</a>
                <a href="about.html" class="text-zinc-200 hover:text-white uppercase tracking-widest text-[10px] transition-colors">About</a>
                <a href="https://discord.com/invite/yfRJuXpfyk" target="_blank" class="bg-white text-black hover:bg-fuchsia-500 hover:text-white px-6 py-2.5 rounded-none transition-all duration-300 flex items-center gap-2 text-[10px] font-black uppercase tracking-widest shadow-xl">
                    <i class="fa-brands fa-discord"></i> Discord
                </a>
            </div>
            <button class="md:hidden text-zinc-100" onclick="toggleMenu()">
                <i class="fa-solid fa-bars text-2xl"></i>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="fixed inset-0 z-[60] bg-zinc-950 hidden flex-col items-center justify-center space-y-10 text-4xl font-black p-6">
        <button class="absolute top-10 right-10 text-zinc-400" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></button>
        <a href="index.html" class="text-fuchsia-500 uppercase tracking-widest italic">Home</a>
        <a href="forum.html" class="text-white hover:text-fuchsia-500 uppercase tracking-widest italic">Forum</a>
        <a href="shop.html" class="text-white hover:text-fuchsia-500 uppercase tracking-widest italic">Shop</a>
        <a href="apply.html" class="text-white hover:text-fuchsia-500 uppercase tracking-widest italic">Apply</a>
        <a href="about.html" class="text-white hover:text-fuchsia-500 uppercase tracking-widest italic">About</a>
        <div class="w-24 h-1 bg-fuchsia-500/20"></div>
        <a href="https://discord.gg/hamletsmp" class="text-fuchsia-500 flex items-center gap-4 text-2xl tracking-widest uppercase italic bg-fuchsia-500/10 px-8 py-4">Discord <i class="fa-solid fa-arrow-up-right-from-square"></i></a>
    </div>

    <!-- Hero -->
    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <div class="absolute inset-0 bg-gradient-to-b from-zinc-950/60 via-transparent to-zinc-950 z-10"></div>
            <img src="https://cdn.discordapp.com/attachments/1330300517943083149/1478801055851610285/image.png?ex=69a9b84e&is=69a866ce&hm=41157ecc9bf198b812464a76bc21ce3cca21c9a10988566b6374d0fb7ee2f17a&" class="w-full h-full object-cover scale-100 saturate-[1.25] brightness-[0.75] contrast-[1.05]" alt="Background">
        </div>
        <div class="relative z-20 text-center px-4 max-w-[1400px] mt-24">
            <div class="inline-flex items-center space-x-3 bg-black/30 border border-white/20 backdrop-blur-md px-6 py-2.5 rounded-none mb-12 animate-fade-in-up">
                <span class="relative flex h-2.5 w-2.5">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-none bg-fuchsia-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-none h-2.5 w-2.5 bg-fuchsia-500"></span>
                </span>
                <span class="text-white text-[10px] font-black uppercase tracking-[0.4em]">ONLINE - 1.8/1.21</span>
            </div>
            <div class="flex flex-col items-center select-none cursor-default mb-16 drop-shadow-[0_15px_35px_rgba(0,0,0,1)] space-y-1">
                <h1 class="text-8xl sm:text-[10rem] md:text-[12rem] lg:text-[16rem] font-black leading-[0.8] tracking-tighter uppercase text-white">HAMLET</h1>
                <h2 class="text-7xl sm:text-[9rem] md:text-[11rem] lg:text-[15rem] font-black leading-[0.8] tracking-tighter uppercase text-transparent bg-clip-text bg-gradient-to-b from-fuchsia-400 to-purple-600">SURVIVAL</h2>
                <h3 class="text-6xl sm:text-[8rem] md:text-[10rem] lg:text-[14rem] font-black leading-[0.8] tracking-tighter uppercase text-white">MULTIPLAYER</h3>
            </div>
            <p class="text-white text-lg md:text-2xl mb-16 max-w-3xl mx-auto font-black leading-relaxed drop-shadow-[0_4px_8px_rgba(0,0,0,0.8)]">A new type of SMP. Still in development. Looking for developers.</p>
            
            <!-- Updated IP Section: No box, but high impact text -->
            <div class="flex flex-col items-center justify-center gap-2 group cursor-pointer animate-fade-in-up" onclick="copyIP()">
                <div class="flex flex-col items-center text-glow">
                    <span class="text-[10px] uppercase tracking-[0.5em] text-fuchsia-500 mb-2 font-black">Server IP</span>
                    <div class="flex items-center gap-4">
                        <span id="ip-text" class="text-3xl md:text-5xl tracking-tighter uppercase italic font-black text-white hover:text-fuchsia-400 transition-colors duration-300">hamletsmp.net</span>
                        <div id="copy-btn" class="text-white opacity-40 group-hover:opacity-100 group-hover:scale-110 transition-all duration-300">
                            <i class="fa-solid fa-copy text-xl md:text-2xl"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-16 px-6 border-t border-white/5 bg-zinc-950">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10">
            <div class="text-zinc-700 text-[10px] uppercase font-black tracking-[0.4em] text-center md:text-left leading-loose">
                Not an official Minecraft product.
            </div>
            <div class="flex gap-6">
                <a href="https://github.com/HamletSMP" target="_blank" class="w-12 h-12 bg-zinc-900 border border-white/5 flex items-center justify-center text-zinc-500 hover:border-fuchsia-500 hover:text-fuchsia-500 transition-all hover:scale-110" title="GitHub">
                    <i class="fa-brands fa-github text-2xl"></i>
                </a>
                <a href="https://x.com/hamletsmpnet" target="_blank" class="w-12 h-12 bg-zinc-900 border border-white/5 flex items-center justify-center text-zinc-500 hover:border-fuchsia-500 hover:text-fuchsia-500 transition-all hover:scale-110" title="Follow on X">
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                    </svg>
                </a>
                <a href="https://discord.gg/hamletsmp" target="_blank" class="w-12 h-12 bg-zinc-900 border border-white/5 flex items-center justify-center text-zinc-500 hover:border-fuchsia-500 hover:text-fuchsia-500 transition-all hover:scale-110" title="Discord">
                    <i class="fa-brands fa-discord text-2xl"></i>
                </a>
            </div>
        </div>
    </footer>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
            menu.classList.toggle('flex');
        }

        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.classList.add('bg-zinc-950/95', 'backdrop-blur-xl', 'py-4', 'shadow-2xl', 'border-b', 'border-white/5');
                nav.classList.remove('bg-transparent', 'py-8');
            } else {
                nav.classList.remove('bg-zinc-950/95', 'backdrop-blur-xl', 'py-4', 'shadow-2xl', 'border-b', 'border-white/5');
                nav.classList.add('bg-transparent', 'py-8');
            }
        });

        function copyIP() {
            const ip = "hamletsmp.net";
            const el = document.createElement('textarea');
            el.value = ip;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const btn = document.getElementById('copy-btn');
            btn.innerHTML = '<i class="fa-solid fa-check text-xl md:text-2xl text-fuchsia-500"></i>';
            setTimeout(() => {
                btn.innerHTML = '<i class="fa-solid fa-copy text-xl md:text-2xl"></i>';
            }, 2000);
        }
    </script>
</body>
</html>
